<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f6f7fb" />
    <title>Ekko</title>
    <style>
      /* Brand faces, self-hosted (docs/DESIGN.md): Inter = UI, Newsreader = headlines,
         Geist Mono = machine output only (ciphertext, security codes, recovery words). */
      @font-face {
        font-family: "Inter";
        font-style: normal;
        font-weight: 400;
        src: url("fonts/inter-latin-400-normal.woff2") format("woff2");
      }
      @font-face {
        font-family: "Inter";
        font-style: normal;
        font-weight: 500;
        src: url("fonts/inter-latin-500-normal.woff2") format("woff2");
      }
      @font-face {
        font-family: "Newsreader";
        font-style: normal;
        font-weight: 500;
        src: url("fonts/newsreader-latin-500-normal.woff2") format("woff2");
      }
      @font-face {
        font-family: "Geist Mono";
        font-style: normal;
        font-weight: 400;
        src: url("fonts/geist-mono-latin-400-normal.woff2") format("woff2");
      }

      /* Light column from docs/DESIGN.md — the site's lit consumer look, adopted by the
         popup 2026-07-16. Shadows are tinted blue-gray, never plain black. Coral is the
         sole accent and stays scarce; --accent-deep is its small-text weight (pure coral
         doesn't clear AA on paper below ~18px). */
      :root {
        --bg: #f6f7fb;
        --surface: #ffffff;
        --surface-2: #eef1f7;
        --well: #f3f5f9;
        --line: #e4e7ef;
        --line-soft: #eceef5;
        --fg: #14161d;
        --ink-soft: #363a46;
        --muted: #6d7382;
        --faint: #a9aebc;
        --placeholder: #949cb0;
        --accent: #ff5f52;
        --accent-deep: #d63d30;
        --accent-fg: #ffffff;
        --glow-b: #2fcbb5;
        --good: #0d8049;
        --good-dot: #17a05e;
        --warn: #96690a;
        --warn-dot: #d9a13d;
        --bad: #b3261e;
        --shadow-card:
          0 1px 2px rgba(133, 145, 172, 0.1),
          0 10px 28px -18px rgba(133, 145, 172, 0.45);
        --serif: "Newsreader", Georgia, serif;
        --sans: "Inter", -apple-system, system-ui, "Segoe UI", sans-serif;
        --mono: "Geist Mono", ui-monospace, "SF Mono", Menlo, monospace;
        --r: 14px;
      }
      * { box-sizing: border-box; }
      html { color-scheme: light; }
      html, body { margin: 0; }
      body {
        width: 384px;
        font: 13.5px/1.5 var(--sans);
        background: var(--bg);
        color: var(--fg);
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }
      /* Only 400/500 ship — never let the browser synthesize a fake bold. */
      b, strong { font-weight: 500; color: var(--fg); }
      button { font: inherit; cursor: pointer; color: inherit; touch-action: manipulation; }
      input, select, textarea { font: inherit; }
      .hidden { display: none !important; }

      /* app shell: header + scrollable body + bottom tab bar. White bars, paper body. */
      #app { display: flex; flex-direction: column; height: 552px; }
      .appbar {
        display: flex; align-items: center; gap: 9px; padding: 13px 16px;
        background: var(--surface); border-bottom: 1px solid var(--line); flex: none;
      }
      .appbar .logo { color: var(--accent); display: flex; }
      .appbar .logo svg { width: 21px; height: 21px; }
      .appbar .name { font-size: 16px; font-weight: 500; letter-spacing: -0.01em; }
      .appbar .grow { flex: 1; }
      .appbar .status-dot { position: relative; width: 8px; height: 8px; border-radius: 50%; background: var(--faint); }
      .appbar .status-dot.on { background: var(--good-dot); }
      .appbar .status-dot.locked { background: var(--warn-dot); box-shadow: 0 0 0 3px rgba(217, 161, 61, 0.18); }
      /* the echo ping: protected = quietly listening */
      .appbar .status-dot.on::after {
        content: ""; position: absolute; inset: -5px; border-radius: 50%;
        border: 1px solid rgba(23, 160, 94, 0.55);
        animation: ping 3.4s cubic-bezier(0.2, 0.6, 0.4, 1) infinite;
      }
      @keyframes ping {
        0% { transform: scale(0.35); opacity: 0.9; }
        55%, 100% { transform: scale(1.5); opacity: 0; }
      }

      main { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 14px; }
      main::-webkit-scrollbar { width: 8px; }
      main::-webkit-scrollbar-thumb { background: #d9dde8; border-radius: 8px; }
      main::-webkit-scrollbar-thumb:hover { background: #c9ceda; }

      .tabbar { display: flex; border-top: 1px solid var(--line); flex: none; background: var(--surface); }
      .tabbar button {
        flex: 1; background: none; border: none; padding: 9px 0 8px; color: var(--muted);
        display: flex; flex-direction: column; align-items: center; gap: 3px;
        font-size: 10.5px; font-weight: 500; transition: color 0.15s ease;
      }
      .tabbar button svg { width: 20px; height: 20px; }
      .tabbar button.active { color: var(--accent-deep); }
      .tabbar button:hover { color: var(--ink-soft); }
      .tabbar button.active:hover { color: var(--accent-deep); }

      /* building blocks */
      h2 {
        font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.12em;
        color: var(--muted); margin: 0 0 9px; font-weight: 500;
      }
      .card {
        background: var(--surface); border: 1px solid var(--line); border-radius: var(--r);
        padding: 15px; margin-bottom: 12px; box-shadow: var(--shadow-card);
      }
      .card.tight { padding: 4px 15px; }
      .muted { color: var(--muted); font-size: 12px; }
      .hint { color: var(--muted); font-size: 11.5px; margin-top: 6px; }
      .mono { font-family: var(--mono); font-size: 11.5px; letter-spacing: 0.02em; word-break: break-all; }
      .strong { font-weight: 500; color: var(--fg); }
      .ellip { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .nm-label { font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .divider { height: 1px; background: var(--line-soft); margin: 12px 0; }
      .row { display: flex; gap: 9px; align-items: center; }
      .grow { flex: 1; min-width: 0; }
      .right { margin-left: auto; }
      .center { text-align: center; }

      .btn {
        display: inline-flex; align-items: center; justify-content: center; gap: 6px;
        font-weight: 500; font-size: 13px; color: var(--fg);
        background: var(--surface); border: 1px solid var(--line); border-radius: 999px;
        padding: 8px 14px;
        transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease,
          transform 0.15s ease, box-shadow 0.2s ease, filter 0.15s ease;
      }
      .btn:hover {
        border-color: color-mix(in srgb, var(--accent) 45%, var(--line));
        background: color-mix(in srgb, var(--accent) 7%, var(--surface));
      }
      /* The product button — the site's glossy accent CTA, verbatim (styles.css .btn--solid):
         one soft top light, one crisp edge, coral bloom below. */
      .btn.primary {
        background: linear-gradient(180deg, color-mix(in srgb, var(--accent) 86%, #ffffff), var(--accent) 62%);
        border-color: color-mix(in srgb, var(--accent) 80%, #10154d);
        color: var(--accent-fg);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.32),
          0 8px 22px -8px color-mix(in srgb, var(--accent) 55%, transparent),
          0 2px 6px -2px color-mix(in srgb, var(--accent) 38%, transparent);
      }
      .btn.primary:hover {
        transform: translateY(-1px); filter: brightness(1.05);
        border-color: color-mix(in srgb, var(--accent) 80%, #10154d);
        background: linear-gradient(180deg, color-mix(in srgb, var(--accent) 86%, #ffffff), var(--accent) 62%);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.36),
          0 12px 28px -8px color-mix(in srgb, var(--accent) 62%, transparent),
          0 3px 8px -2px color-mix(in srgb, var(--accent) 42%, transparent);
      }
      .btn.primary:active { transform: none; filter: brightness(0.97); }
      .btn.block { width: 100%; padding: 10px 14px; }
      .btn.ghost { background: none; border-color: transparent; color: var(--accent-deep); padding: 7px 10px; }
      .btn.ghost:hover { background: color-mix(in srgb, var(--accent) 9%, transparent); border-color: transparent; }
      .btn.danger { color: var(--bad); }
      .btn.danger:hover {
        background: color-mix(in srgb, var(--bad) 8%, transparent);
        border-color: transparent;
      }
      .btn.icon svg { width: 14px; height: 14px; flex: none; }
      .btn.icon span { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .btn.sq { padding: 7px; border-radius: 50%; }
      /* Two-tap destructive state: the button itself asks the question (no OS dialogs). */
      .btn.armed, .btn.sq.armed, .btn.ghost.armed {
        width: auto; border-radius: 999px; padding: 7px 12px;
        background: var(--bad); border-color: var(--bad); color: #fff;
        font-size: 12px; white-space: nowrap;
      }
      .btn.armed:hover { background: color-mix(in srgb, var(--bad) 88%, #000); color: #fff; }
      .btn.sq svg { width: 15px; height: 15px; flex: none; }
      /* row actions sit quiet in the list; intent color arrives on hover/focus */
      .btn.ghost.sq { color: var(--muted); }
      .btn.ghost.sq:hover, .btn.ghost.sq:focus-visible { color: var(--fg); background: var(--surface-2); }
      .btn.ghost.sq.danger:hover, .btn.ghost.sq.danger:focus-visible { color: var(--bad); background: color-mix(in srgb, var(--bad) 7%, transparent); }
      .btn:disabled { opacity: 0.45; cursor: default; filter: none; transform: none; }
      .btn:disabled:hover { background: var(--surface); border-color: var(--line); }
      .btn.ghost:disabled:hover { background: none; border-color: transparent; }
      .btn.primary:disabled:hover {
        background: linear-gradient(180deg, color-mix(in srgb, var(--accent) 86%, #ffffff), var(--accent) 62%);
        border-color: color-mix(in srgb, var(--accent) 80%, #10154d);
      }
      .btn[aria-busy="true"]::after {
        content: ""; display: inline-block; width: 11px; height: 11px; flex: none;
        border: 2px solid currentColor; border-right-color: transparent; border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }

      input, select, textarea {
        width: 100%; color: var(--fg); background: var(--well); border: 1px solid var(--line);
        border-radius: 11px; padding: 9px 12px; margin: 4px 0;
      }
      input::placeholder, textarea::placeholder { color: var(--placeholder); }
      input:focus, select:focus, textarea:focus, .btn:focus-visible, .tabbar button:focus-visible,
      .eye:focus-visible {
        outline: 2px solid var(--accent); outline-offset: 1px; border-color: transparent;
      }
      textarea { resize: vertical; min-height: 58px; word-break: break-all; }
      textarea#encOut, textarea#decIn, textarea#inviteIn { font-family: var(--mono); font-size: 11.5px; }
      label.field { display: block; font-size: 12px; color: var(--muted); margin-top: 9px; }
      .pw { position: relative; }
      .pw .eye { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--placeholder); padding: 4px; }
      .pw .eye:hover { color: var(--muted); }
      .pw .eye svg { width: 16px; height: 16px; display: block; }

      .search { position: relative; }
      .search svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 15px; height: 15px; color: var(--placeholder); }
      .search input { padding-left: 34px; }

      /* @handle input + badge */
      .handle-in { position: relative; }
      .handle-in .at { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--placeholder); font-weight: 500; pointer-events: none; }
      .handle-in input { padding-left: 24px; }
      .handle-badge {
        font-weight: 500; font-size: 14px; color: var(--accent-deep); padding: 9px 13px;
        background: color-mix(in srgb, var(--accent) 6%, var(--surface));
        border: 1px solid color-mix(in srgb, var(--accent) 25%, var(--line)); border-radius: 999px;
        overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      }
      .or { display: flex; align-items: center; color: var(--muted); font-size: 11px; margin: 12px 0; }
      .or::before, .or::after { content: ""; flex: 1; height: 1px; background: var(--line-soft); }
      .or span { padding: 0 10px; }

      .chip { font-size: 10.5px; font-weight: 500; letter-spacing: 0.02em; padding: 2px 8px; border-radius: 999px; border: 1px solid var(--line); white-space: nowrap; }
      .chip.ok { color: var(--good); border-color: rgba(13, 128, 73, 0.3); background: rgba(13, 128, 73, 0.06); }
      .chip.no { color: var(--warn); border-color: rgba(150, 105, 10, 0.28); background: rgba(150, 105, 10, 0.06); }

      /* Linked messenger handles under a contact — one identity across their apps.
         Known platforms show their mark (tinted like .appicon); unknown ids keep a dot. */
      /* Invite-a-friend pitch: user-visible message text in a quiet well (interface face,
         not mono — it is prose, not machine output). Mirrors onboarding.html's .pitch. */
      .pitch {
        background: color-mix(in srgb, var(--ink, #14161d) 3%, var(--surface));
        border: 1px solid var(--line-soft); border-radius: 10px;
        padding: 10px 12px; font-size: 12.5px; line-height: 1.5; user-select: all;
      }

      .socials { display: flex; flex-wrap: wrap; gap: 4px 11px; margin: 4px 0 1px; }
      .social { display: inline-flex; align-items: center; gap: 5px; font-size: 11.5px; color: var(--muted); min-width: 0; }
      .social .social-dot { width: 7px; height: 7px; border-radius: 50%; flex: none; background: var(--faint); }
      .social .social-logo { display: inline-flex; flex: none; color: var(--cg, color-mix(in srgb, var(--c) 72%, #14161d)); }
      .social .social-logo svg { width: 11px; height: 11px; }

      /* toggle switch — checked wears the CTA's coral gloss */
      .switch { position: relative; width: 42px; height: 24px; flex: none; }
      .switch input { position: absolute; opacity: 0; width: 100%; height: 100%; margin: 0; cursor: pointer; }
      .switch .track { position: absolute; inset: 0; background: #dfe3ed; border-radius: 999px; box-shadow: inset 0 1px 2px rgba(133, 145, 172, 0.28); transition: background 0.15s; }
      .switch .track::after { content: ""; position: absolute; top: 2px; left: 2px; width: 20px; height: 20px; border-radius: 50%; background: #fff; box-shadow: 0 1px 3px rgba(120, 130, 155, 0.45); transition: transform 0.15s; }
      .switch input:checked + .track { background: linear-gradient(180deg, color-mix(in srgb, var(--accent) 86%, #ffffff), var(--accent) 70%); box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.3); }
      .switch input:checked + .track::after { transform: translateX(18px); }
      .switch input:disabled + .track { opacity: 0.4; }
      .switch input:focus-visible + .track { outline: 2px solid var(--accent); outline-offset: 2px; }

      .listrow { display: flex; align-items: center; gap: 11px; padding: 11px 0; border-top: 1px solid var(--line-soft); }
      .listrow:first-child { border-top: none; }
      /* Inset editor that opens beneath a listrow: the contact apps editor.
         Quiet inset wash, never a second card. */
      .apps-edit {
        margin: 2px 0 9px; padding: 4px 12px 12px;
        background: color-mix(in srgb, var(--ink, #14161d) 3%, var(--surface));
        border: 1px solid var(--line-soft); border-radius: 12px;
      }
      .apps-edit .listrow { border-top: none; padding: 7px 0; }
      /* Avatar hue (--av) is the cross-device identity color — the same palette hashes a
         handle on the phone (ios Platforms.swift). The wash and the AA-deepened initials
         are derived here so the constants never fork per theme. */
      .avatar {
        --av: var(--accent);
        width: 32px; height: 32px; border-radius: 50%; flex: none;
        display: flex; align-items: center; justify-content: center;
        font-weight: 500; font-size: 12px; letter-spacing: 0.02em;
        background: color-mix(in srgb, var(--av) 10%, var(--surface));
        color: color-mix(in srgb, var(--av) 72%, #14161d);
        border: 1px solid color-mix(in srgb, var(--av) 22%, var(--surface));
      }
      /* App tile: brand hue in --c (src/popup/brands.ts, colours shared with ios
         Platforms.swift), rendering derived. --cg overrides the derived glyph colour for
         brands whose hue can't carry a mark on paper (Snapchat yellow). */
      .appicon {
        --c: var(--muted);
        width: 30px; height: 30px; border-radius: 9px; flex: none;
        display: flex; align-items: center; justify-content: center;
        background: color-mix(in srgb, var(--c) 11%, var(--surface));
        color: var(--cg, color-mix(in srgb, var(--c) 72%, #14161d));
      }
      .appicon svg { width: 16px; height: 16px; }

      /* hero / welcome — serif headline over the mark held in its rings */
      .hero { text-align: center; padding: 34px 10px 10px; }
      .hero .logo { position: relative; display: inline-flex; color: var(--accent); }
      .hero .logo svg { width: 46px; height: 46px; position: relative; }
      .hero .logo::before, .hero .logo::after {
        content: ""; position: absolute; top: 50%; left: 50%; translate: -50% -50%;
        border-radius: 50%; pointer-events: none;
      }
      .hero .logo::before {
        width: 88px; height: 88px;
        border: 1px solid color-mix(in srgb, var(--accent) 38%, transparent);
        animation: breathe 5.6s ease-in-out infinite;
      }
      .hero .logo::after {
        width: 126px; height: 126px;
        border: 1px solid color-mix(in srgb, var(--accent) 18%, transparent);
        animation: breathe 5.6s ease-in-out 1.2s infinite;
      }
      @keyframes breathe {
        0%, 100% { transform: scale(0.94); opacity: 0.55; }
        50% { transform: scale(1.05); opacity: 1; }
      }
      .hero h1 { font-family: var(--serif); font-size: 23px; font-weight: 500; letter-spacing: -0.01em; margin: 18px 0 7px; }
      .hero.compact { padding: 26px 10px 2px; }
      .hero.compact h1 { font-size: 20px; }
      .hero p { color: var(--muted); margin: 0 auto 6px; max-width: 290px; }
      .feature { display: flex; gap: 11px; align-items: flex-start; text-align: left; padding: 9px 4px; }
      .feature svg { width: 16px; height: 16px; color: var(--accent); flex: none; margin-top: 2px; }
      .feature .t { font-weight: 500; }
      .feature .d { color: var(--muted); font-size: 12px; }

      /* The person the directory answered with, shown BEFORE anything is added — so nobody
         adopts a key they never looked at. A well inside the card: recessed, not raised. */
      .preview {
        margin-top: 12px; padding: 14px; border-radius: 12px;
        background: var(--surface-2); border: 1px solid var(--line);
        box-shadow: inset 0 1px 2px rgba(133, 145, 172, 0.12);
      }
      .preview h2 { margin-bottom: 6px; }
      /* The 60 digits are read aloud to another human, so keep the groups whole and legible. */
      .preview .safety { color: var(--ink-soft); font-size: 12.5px; line-height: 1.7; word-break: normal; }

      /* Machine output that a person must keep: the backup passphrase. Mono per DESIGN.md. */
      .phrase {
        font-family: var(--mono); font-size: 12.5px; line-height: 1.7; color: var(--ink-soft);
        background: var(--well); border: 1px solid var(--line); border-radius: 11px;
        padding: 10px 12px; word-spacing: 0.35em;
      }

      .qrbox { width: 290px; max-width: 100%; aspect-ratio: 1; margin: 10px auto 0; }
      img.qr { display: block; max-width: 100%; height: auto; margin: 0 auto; border-radius: 12px; background: #fff; border: 1px solid var(--line); }
      .msg { font-size: 12px; margin-top: 7px; }
      .msg.err { color: var(--bad); }
      .msg.ok { color: var(--good); }
      details.adv > summary { cursor: pointer; color: var(--muted); font-size: 12px; list-style: none; padding: 2px 0; }
      details.adv > summary:hover { color: var(--fg); }
      details.adv > summary::-webkit-details-marker { display: none; }
      .fade { animation: fade 0.16s ease-out; }
      @keyframes fade { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; } }
      @keyframes spin { to { transform: rotate(360deg); } }
      @media (prefers-reduced-motion: reduce) {
        .fade { animation: none; }
        .btn[aria-busy="true"]::after { animation: none; }
        .switch .track, .switch .track::after { transition: none; }
        .appbar .status-dot.on::after { animation: none; opacity: 0; }
        /* rings rest at their finished state — a held point, not an empty one */
        .hero .logo::before, .hero .logo::after { animation: none; opacity: 1; }
        .btn, .tabbar button { transition: none; }
        .btn.primary:hover { transform: none; }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="popup.js"></script>
  </body>
</html>
