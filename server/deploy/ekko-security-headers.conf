# Security headers for useekko.app — install at /etc/nginx/ekko-security-headers.conf.
# Included by BOTH the server block and any location that sets its own add_header
# (nginx drops all inherited add_header directives the moment a block adds one), so the
# whole site keeps a single security posture. Edit here, never inline.
add_header X-Content-Type-Options nosniff always;
add_header Referrer-Policy no-referrer always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
add_header Content-Security-Policy "default-src 'none'; script-src 'self' https://analytics.useekko.app; style-src 'self'; font-src 'self'; img-src 'self' data:; connect-src 'self' https://analytics.useekko.app; base-uri 'none'; form-action 'none'; frame-ancestors 'none'" always;
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
