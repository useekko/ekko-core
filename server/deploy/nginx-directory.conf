# Ekko directory API + marketing site — public nginx vhost for useekko.app.
# Apex serves the static site and mounts the API on explicit paths (invites stay short:
# useekko.app/u/alice); www redirects to the apex.
#
# This box's certbot has no nginx plugin installed — it issues via the `webroot` authenticator,
# so the cert is obtained and renewed independently of this file; nginx just needs to serve the
# challenge path and point at the resulting cert.
#
# Port 443 is bound directly by nginx (no stream-module router as of 2026-07-10 — the old
# SNI-preread camouflage router was removed). This is a normal multi-site nginx setup: this
# vhost matches server_name useekko.app/www.useekko.app; analytics.useekko.app has its own
# vhost. Never revert these to `listen 127.0.0.1:8443` — that strands the domain and it falls
# through to whatever else answers 443 (the analytics dashboard). This exact regression bit on
# 2026-07-10 when a stale copy of this file was deployed over the live one.
#
#   1. useekko.app DNS is on Cloudflare (proxied apex); analytics.useekko.app DNS-only
#   2. sudo mkdir -p /var/www/certbot
#   3. sudo cp nginx-directory.conf /etc/nginx/sites-available/ekko-directory
#   4. sudo ln -s ../sites-available/ekko-directory /etc/nginx/sites-enabled/
#   5. sudo nginx -t && sudo systemctl reload nginx   # port-80 blocks work first
#   6. sudo certbot certonly --webroot -w /var/www/certbot -d useekko.app -d www.useekko.app
#   7. sudo nginx -t && sudo systemctl reload nginx   # 443 blocks now serve the domain
#
server {
    listen 80;
    listen [::]:80;
    server_name useekko.app www.useekko.app;

    # Must stay reachable over plain HTTP forever — certbot re-validates this path on every renewal.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.useekko.app;

    ssl_certificate     /etc/letsencrypt/live/useekko.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/useekko.app/privkey.pem;

    return 301 https://useekko.app$request_uri;
}

# useekko.app is the only 443 vhost that should answer the apex. analytics.useekko.app
# has its own server block; both match by server_name, so neither needs default_server.

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name useekko.app;

    ssl_certificate     /etc/letsencrypt/live/useekko.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/useekko.app/privkey.pem;

    # Small key blobs only; keep bodies tight.
    client_max_body_size 16k;

    # Trust Cloudflare's visitor IP header only when the TCP peer is a published
    # Cloudflare network. Without this, rate limits bucket an entire edge POP together.
    # Source of truth: https://www.cloudflare.com/ips/ (checked 2026-07-11).
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;
    real_ip_recursive on;

    # ── Static marketing site (repo site/, rsync'd to /var/www/ekko-site) ──
    # The page is self-contained by design; the CSP proves it: nothing loads from
    # anywhere but this origin, no inline script/style, and nothing may frame us.
    root /var/www/ekko-site;

    include /etc/nginx/ekko-security-headers.conf;

    # A miss anywhere under the site lands on the branded page, still a real 404.
    # internal: /404.html is not reachable as a URL of its own, only as the handler.
    error_page 404 /404.html;
    location = /404.html {
        internal;
        add_header Cache-Control "no-cache";
        include /etc/nginx/ekko-security-headers.conf;
    }

    location / {
        # $uri.html gives clean URLs (/about → about.html) without a redirect hop.
        try_files $uri $uri.html $uri/ =404;
        # Pages carry the versioned asset URLs — they must always be fresh.
        add_header Cache-Control "no-cache";
        include /etc/nginx/ekko-security-headers.conf;
    }
    # CSS/JS must revalidate on every load (cheap 304s): a long-lived copy renders new
    # HTML against a stale stylesheet — shipped once as "the design is broken", never
    # again. The ?v= query on their URLs additionally busts already-poisoned caches.
    location ~* \.(css|js)$ {
        add_header Cache-Control "no-cache";
        # add_header here drops every inherited header — re-include the shared set so
        # static assets can never drift to a different security posture than the pages.
        include /etc/nginx/ekko-security-headers.conf;
    }
    # Stable binaries (fonts, generated images, video) keep a real cache lifetime.
    location ~* \.(woff2|png|svg|ico|mp4)$ {
        expires 7d;
        add_header Cache-Control "public";
        include /etc/nginx/ekko-security-headers.conf;
    }

    # ── Directory API (127.0.0.1:8787) ──
    # Explicit API prefixes; short invite links stay useekko.app/u/alice. A NEW API
    # route family (e.g. /handles/*) now needs a matching location added here.
    location = /health { proxy_pass http://127.0.0.1:8787; include /etc/nginx/ekko-proxy-params.conf; }
    location = /keys   { proxy_pass http://127.0.0.1:8787; include /etc/nginx/ekko-proxy-params.conf; }
    location ^~ /keys/ { proxy_pass http://127.0.0.1:8787; include /etc/nginx/ekko-proxy-params.conf; }
    location ^~ /u/    { proxy_pass http://127.0.0.1:8787; include /etc/nginx/ekko-proxy-params.conf; }
    location = /lookup { proxy_pass http://127.0.0.1:8787; include /etc/nginx/ekko-proxy-params.conf; }
    location = /auth/challenge { proxy_pass http://127.0.0.1:8787; include /etc/nginx/ekko-proxy-params.conf; }
    location = /handles/link   { proxy_pass http://127.0.0.1:8787; include /etc/nginx/ekko-proxy-params.conf; }
    location = /handles/unlink { proxy_pass http://127.0.0.1:8787; include /etc/nginx/ekko-proxy-params.conf; }
    location = /recover        { proxy_pass http://127.0.0.1:8787; include /etc/nginx/ekko-proxy-params.conf; }
    location = /verify/start   { proxy_pass http://127.0.0.1:8787; include /etc/nginx/ekko-proxy-params.conf; }
    location = /verify/check   { proxy_pass http://127.0.0.1:8787; include /etc/nginx/ekko-proxy-params.conf; }
    location = /waitlist { proxy_pass http://127.0.0.1:8787; include /etc/nginx/ekko-proxy-params.conf; }
    # No /bug here: the Cloudflare worker owns useekko.app/bug and writes to Supabase, so
    # the request never reaches this box.
    # No /admin/ here ON PURPOSE: operator attestation stays reachable only from the box
    # itself (curl 127.0.0.1:8787 over SSH), token or not.
}

# Shared snippets to install once alongside this vhost:
#   /etc/nginx/ekko-security-headers.conf  ← deploy/ekko-security-headers.conf (this repo)
#   /etc/nginx/ekko-proxy-params.conf:
#     proxy_set_header Host $host;
#     proxy_set_header X-Forwarded-For $remote_addr;
#     proxy_set_header X-Forwarded-Proto $scheme;
#     proxy_read_timeout 15s;
