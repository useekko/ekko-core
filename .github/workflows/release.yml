# Tag v* -> build, test, stage a DRAFT release with the zips attached.
# A human writes the notes and clicks publish. If the release already exists
# (e.g. it was hand-crafted before the tag landed), this touches nothing:
# never overwrite a curated release's assets with a rebuild from a later tree.
name: Release
on:
  push:
    tags: ['v*']
permissions:
  contents: write
jobs:
  release:
    if: github.repository == 'useekko/ekko-core'
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.existing.outputs.skip }}
    steps:
      - uses: actions/checkout@v4
      - name: Stop if the release already exists
        id: existing
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "release $GITHUB_REF_NAME already exists; leaving it alone"
          fi
      - uses: actions/setup-node@v4
        if: steps.existing.outputs.skip != 'true'
        with:
          node-version: 26
          cache: npm
      - if: steps.existing.outputs.skip != 'true'
        run: npm ci && npm test && npm run package && npm run package:firefox
      - if: steps.existing.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" --draft --generate-notes \
            --title "Ekko $GITHUB_REF_NAME" artifacts/*.zip

  # Safari ships as a signed, notarized macOS app — it can't be a zip like the others, so it needs
  # a Mac runner and Apple secrets. Runs after `release` has staged the draft, then attaches the
  # .dmg. Non-blocking: if the Apple secrets aren't set yet, it warns and skips instead of failing
  # the whole release. See scripts/mac-safari-release.sh for the six secrets it wants.
  build-safari:
    needs: release
    if: needs.release.outputs.skip != 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Skip if signing secrets aren't configured
        id: secrets
        env:
          CERT: ${{ secrets.MAC_CERT_P12_BASE64 }}
        run: |
          if [ -z "$CERT" ]; then
            echo "have=false" >> "$GITHUB_OUTPUT"
            echo "::warning::MAC_CERT_P12_BASE64 not set — skipping the Safari .dmg. Add the Apple signing secrets to enable it."
          else
            echo "have=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-node@v4
        if: steps.secrets.outputs.have == 'true'
        with:
          node-version: 26
          cache: npm
      - if: steps.secrets.outputs.have == 'true'
        run: npm ci
      - name: Build, sign, notarize the Safari .dmg
        if: steps.secrets.outputs.have == 'true'
        env:
          MAC_CERT_P12_BASE64: ${{ secrets.MAC_CERT_P12_BASE64 }}
          MAC_CERT_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          AC_API_KEY_ID: ${{ secrets.AC_API_KEY_ID }}
          AC_API_ISSUER_ID: ${{ secrets.AC_API_ISSUER_ID }}
          AC_API_KEY_P8_BASE64: ${{ secrets.AC_API_KEY_P8_BASE64 }}
        run: scripts/mac-safari-release.sh
      - name: Attach the .dmg to the draft release
        if: steps.secrets.outputs.have == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$GITHUB_REF_NAME" artifacts/*.dmg --clobber
