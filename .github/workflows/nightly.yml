# Rolling "nightly" prerelease: one release, one tag, assets replaced in place.
# Skips entirely when main hasn't moved since the last nightly.
name: Nightly
on:
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  nightly:
    if: github.repository == 'useekko/ekko-core'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Skip if main hasn't moved
        id: fresh
        run: |
          if [ "$(git rev-parse -q --verify refs/tags/nightly || true)" = "$(git rev-parse HEAD)" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "nightly tag already points at HEAD; nothing to build"
          fi
      - uses: actions/setup-node@v4
        if: steps.fresh.outputs.skip != 'true'
        with:
          node-version: 26
          cache: npm
      - if: steps.fresh.outputs.skip != 'true'
        run: npm ci
      - if: steps.fresh.outputs.skip != 'true'
        run: npm test
      - if: steps.fresh.outputs.skip != 'true'
        run: npm run package && npm run package:firefox
      - name: Publish rolling prerelease
        if: steps.fresh.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Bank the download tally BEFORE --clobber wipes it: replacing an asset resets its
          # download_count, so a rolling release under-counts forever unless we accumulate.
          # The running total lives in downloads.json (shields endpoint schema) on the release
          # itself; the README badge reads it. `message` also folds in the versioned releases'
          # live counts (those assets are never clobbered), refreshed each nightly.
          WIPED=$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/nightly" \
            --jq '[.assets[] | select(.name | endswith(".zip")) | .download_count] | add // 0' 2>/dev/null || echo 0)
          PRIOR=$(curl -sfL "https://github.com/$GITHUB_REPOSITORY/releases/download/nightly/downloads.json" \
            | jq -r '.nightlyTotal // empty' || true)
          PRIOR=${PRIOR:-10} # seed: the tally the 2026-07-18 rebuilds had already wiped
          NIGHTLY_TOTAL=$((PRIOR + WIPED))
          OTHERS=$(gh api "repos/$GITHUB_REPOSITORY/releases?per_page=100" \
            --jq '[.[] | select(.tag_name != "nightly") | .assets[].download_count] | add // 0' 2>/dev/null || echo 0)
          printf '{"schemaVersion":1,"label":"downloads","message":"%s","color":"ff5f52","nightlyTotal":%s}\n' \
            "$((NIGHTLY_TOTAL + OTHERS))" "$NIGHTLY_TOTAL" > downloads.json
          cp artifacts/ekko-*-chromium.zip ekko-nightly-chromium.zip
          cp artifacts/ekko-*-firefox.zip ekko-nightly-firefox.zip
          SUMS=$(shasum -a 256 ekko-nightly-*.zip | awk '{print "- `" $2 "` sha256 `" $1 "`"}')
          NOTES=$(printf 'Rolling build of `main` @ %s (%s).\n\nUnzip, then chrome://extensions -> Developer mode -> Load unpacked -> pick the unzipped folder. The Firefox zip is experimental.\n\n%s\n\nNightlies are for testing: expect rough edges. Stable installs live in the versioned releases.' "${GITHUB_SHA::7}" "$(date -u +%F)" "$SUMS")
          git tag -f nightly && git push -f origin nightly
          if ! gh release view nightly >/dev/null 2>&1; then
            gh release create nightly --prerelease --title "Nightly" --notes "placeholder"
          fi
          gh release upload nightly ekko-nightly-chromium.zip ekko-nightly-firefox.zip downloads.json --clobber
          gh release edit nightly --prerelease --title "Nightly ($(date -u +%F))" --notes "$NOTES"
