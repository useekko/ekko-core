name: Bug report
description: Something broke that isn't a messenger adapter losing its selectors.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: >
        **Never paste private keys, recovery words, or message plaintext into an issue.**
        Ciphertext (`EKK1…`) is fine — that's the point.
        For vulnerabilities, don't file an issue: see [SECURITY.md](https://github.com/useekko/ekko-core/blob/main/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What you did, what you expected, what you got instead.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Ekko version and install source
      placeholder: "0.7.0, nightly zip / built from source at <commit>"
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser and OS
      placeholder: "Chrome 138 on macOS 15"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Console errors, if any
      description: From the extension's service worker console and/or the page console.
      render: text
